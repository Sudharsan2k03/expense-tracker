<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #070b12;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border-radius: 12px;
            background: #0e1420;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #10b981; margin-bottom: 0.5rem; }
        p { color: #94a3b8; }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Expense Tracker API</h1>
        <p>The backend server is running successfully.</p>
        <p>Please access the application via the React frontend.</p>
        <a href="http://localhost:3000" class="btn">Go to Frontend</a>
    </div>
</body>
</html>
